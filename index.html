---
layout: default
title: Home
---


 <!-- Tags -->
  <ul class="tags">
{% for tag in post.tags %}
  <li><a href="/tags#{{ tag }}" class="tag">{{ tag }}</a></li>
{% endfor %}
</ul>
<div class="posts">

  {% for post in paginator.posts %}

   <svg class="icon-calendar"></svg>
     <font color="#767676"> <i> {{ post.date | date_to_long_string }} </i> </font>
    <br>
  <div class="post">
    <h1 class="post-title">
      <a href="{{ site.baseurl }}{{ post.url }}">
        {{ post.title }} 
      </a>
    </h1>


<ul class="tags">
    {% for tag in post.tags %}
      <li><a href="/tags#{{ tag }}" class="tag">{{ tag }}</a></li>
    {% endfor %}
  </ul>
<hr >
    {{ post.content }}

  </div>
  {% endfor %}
</div>
