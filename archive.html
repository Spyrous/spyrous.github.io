---
layout: page
permalink: /archive/
title: Archives
---

{% for post in site.posts %}

{{ post.date | date_to_long_string }}
<!-- Tags -->
<ul class="tags">
  {% for tag in post.tags %}
    <li>
      <a href="/tags#{{ tag }}" class="tag tag-archive-font">{{ tag }}</a>
    </li>
  {% endfor %}
</ul>

<!-- Titles -->
<a href="{{ post.url }}">{{ post.title }}</a>
{% endfor %}
